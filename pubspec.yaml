name: quietbytes
description: "QuietBytes - Your iOS App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management (Choose ONE)
  flutter_riverpod: ^3.2.1  # OR provider: ^6.0.0
  
  # Navigation
  go_router: ^17.1.0
  
  # HTTP & API
  dio: ^5.0.0
  
  # Local Storage
  shared_preferences: ^2.0.0
  hive: ^2.2.0
  
  # UI Components
  flutter_svg: ^2.0.0
  url_launcher: ^6.0.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    #- assets/icons/
  
  fonts:
    - family: Jersey20
      fonts:
        - asset: assets/fonts/Jersey20-Regular.ttf