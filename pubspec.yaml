name: quietbytes
description: "QuietBytes - Your iOS App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  google_maps_flutter: ^2.14.2
  
  # State Management (Choose ONE)
  flutter_riverpod: ^2.0.0  # OR provider: ^6.0.0
  
  # Navigation
  go_router: ^13.0.0
  
  # HTTP & API
  dio: ^5.0.0
  
  # Local Storage
  shared_preferences: ^2.0.0
  hive: ^2.2.0
  
  # UI Components
  flutter_svg: ^2.0.0
  url_launcher: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.0.0

flutter:
  uses-material-design: true

